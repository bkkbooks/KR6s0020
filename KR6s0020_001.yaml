body:
  text: 大唐山陰沙門智廣撰悉曇天竺文字也西域記云梵王所製原始垂則四十七言寓物合成隨事轉用流演支派其源浸廣因地隨人微有改變而中天竺特為詳正邊裔殊俗兼習訛文語其大較本源莫異斯梗概也頃嘗誦陀羅尼訪求音旨多所差舛會南天竺沙門般若菩提齎陀羅尼梵挾自南海而謁五臺寓于山房因從受焉與唐書舊翻兼詳中天音韻不無差反考核源濫所歸悉曇梵僧自云少字學於先師般若瞿沙聲明文轍將盡微致南天祖承摩醯首羅之文此其是也而中天兼以龍宮之文有與南天少異而綱骨必同健馱羅國喜多迦文獨將尤異而字之由皆悉曇也因請其所出研審翻注即其杼軸科以成章音雖少殊文軌斯在效絶域之典弗尚詭異以真言唐書召梵語髣佛而已豈若觀其本文哉俾學者不逾信宿而懸通梵音字餘七千功少用要懿夫聖人利物之智也總持一文理含衆德其在茲乎雖未具觀彼史誥之流別而內經運用固亦備矣然五天之音或若楚夏矣中土學者方審詳正竊書簡牘以記遺文古謂楚書曰胡文者案西域記其閻浮地之南五天之境楚人居焉地周九萬餘里三垂大海北背雪山時無輪王膺運中分七十餘國其總曰五天竺亦曰身毒或云印度有曰大夏是也人遠承梵王雖大分四姓通謂之婆羅門國佛現於其中非胡土也而雪山之北傍臨葱嶺即胡人居焉其字元製有異良以境鄰天竺文字參涉所來經論咸依梵挾而風俗則效習其文粗有增損自古求請佛經多於彼獲之魚魯渾淆直曰胡文謬也其始曰悉曇而韻有六長短兩分字十有二將冠下章之首對聲呼而發韻聲合韻而字生焉即阿上聲短呼阿平聲長呼等是也其中有紇里二合等四文悉曇有之非生字所用今略也其次體文三十有五通前悉曇四十七言明矣聲之所發則牙齒舌喉脣等合于宮商其文各五遍口之聲文有十此中囉曷力遐三聲合也於生字不應遍諸章諸章用之多屬第八及成當體重或不成字如後具論也羅聲全闕生用則初章通羅除之一除羅字羅鑒反餘單章除之二除囉羅二字即第二第三及第八第九第十章也字非重成簡於第一故云餘單章也重章除之三重成也即第四五六七及第十一已下四章也異章句末為他所用兼下除之六即盎迦章字牙齒舌等句末之第五字為上四字所用亦不可更自重故除之也自除之餘各遍能生即迦佉等是也生字之章一十有七各生字殆將四百則梵文彰焉正章之外有孤合之文連字重成即字名也有十一摩多囉此猶點畫兩箇半體兼合成文阿阿等韻生字用十摩多後字傍點名毗灑勒沙尼此云去聲非為摩多訖里章用一別摩多里耶半體用祗耶兼半體囉也初章將前三十四文對阿阿等十二韻呼之增以摩多生字四百有八即迦上迦平等是也迦之聲下十有二文並用迦為字體以阿阿等韻呼之增其摩多合于聲韻各成形也佉伽等聲下例之以成于一章次下十有四章並用初章為字體各隨其所增將阿阿等韻對所合聲字呼之後增其摩多遇當體兩字將合則容之勿生謂第四章中重羅第五重嚩房柯反第六重麼第七重那等是也十一已下四章如次同上之四章同之除第二章將半體中祇耶合於初章迦迦等字之下名枳也枳耶生字三百九十有六枳字幾爾反今詳祗耶當是耶字之省也若然亦同除重唯有三百八十四先書字體三百九十六然將祗耶合之後加摩多夫重成之字下者皆省除頭也已下並同也第三章將囉字合於初章迦迦等字之下名迦上略上迦平略平生字三百九十有六上略力價反下略力迦反上迦下迦並同略之平上取聲他皆效之也第四章將攞字合初章字之下名迦攞迦攞生字三百八十有四攞字洛可反第五章將嚩字合初章字之下名迦嚩上迦嚩平生字三百八十有四嚩字房可反第六章將麼字合初章字之下名􅂪迦麼􅂫迦麼生字三百八十有四第七章將曩字合初章字之下名迦那􅋱迦那生字三百八十有四第八章將半體囉加初初章字之上名􅕷阿勒迦􅕸阿勒迦生字三百九十有六勒字力德反下同第九章將半體囉加第二章字之上名􅟫阿勒枳耶􅟬阿勒枳耶生字三百八十有四若祗耶是耶省亦同除重第十章將半體囉加第三章字之上名􅩲阿勒迦略􅩳阿勒迦略生字三百九十有六略平上第十一章將半體囉加第四章字之上名􅳦阿勒迦羅􅳧阿勒迦羅生字三百八十有四第十二章將半體囉加第五章字之上名􅽭阿勒迦嚩􅽮阿勒迦嚩生字三百八十有四第十三章將半體囉加第六章字之上名阿勒迦麼阿勒迦麼生字三百八十有四第十四章將半體囉加第七章字之上名阿勒迦那阿勒迦那生字三百八十有四第十五章以迦遮吒多波等句末之第五字各加於當句前四字之上及初句末字加後耶等九字之上名盎迦安遮安吒安多唵波盎耶等其必不自重唯二十九字不由韻合名為異章各用阿阿等韻呼之生字三百四十有八盎字阿黨反安字並阿亶反唵字阿感反第十六章用迦等字體以別摩多合之謂之訖里成字三十有四或有加前麼多得成字用非遍能生且據本字言之今詳訖里之麼多祗是悉曇中里字也第十七章用迦等字體參互加之有三十三字隨文受稱謂阿索迦等各用阿阿等韻呼之生字三百九十有六第十八章正章之外有孤合之文或當體兩字重之但依字大呼謂多闍吒拏等字各有重成也或異體字重之即連聲合呼謂悉多羅等是也或不具通麼多止為孤合之文即瑟吒羅等字有通三五麼多也或雖生十二之文而字源不次其猶之孤即阿悉多羅等也或雖異重不必依重以呼之此五句之末字加其句之初即名盎迦等屬前章也或兩字聯聲文形其後聲彰其前如麼盎迦三合等字似云莾迦等也或字一而名分如沙字有沙孚府珂反二音猶假借也或用麼多之文重增其麼多而音必兼之如部林二合字從裒菩侯反婁力鉤反與第十一摩多也或形非麼多獨為嚴字之文如字之上有仰月之畫也或有所成而異其名謂數字重成一字而其下必正呼中上連合短呼之不必正其音如上娑下迦稱阿索迦等也或有其聲而無其形此即阿索迦章等字字則無阿讀之皆帶其音也或不從字生獨為半體之文如怛達祗耶等用則有之字體無也或字有所闕則加怛達之文而音掣呼之如迦佉等字下有達畫則云秸吉八反稧苦八反等也或源由字生增于異形如室梨字猶有奢羅之象錯成印文若篆籀也或考之其生異之其形訖里俱羅俱婁等從迦之省及胡盧等文麼多之異猶草隸也斯則梵書之大觀焉悉曇字記娜麼娑上囉嚩二合社若而也反二合也悉曇去聲已上題目悉曇短阿字上聲短呼音近惡引長阿字依聲長呼別體作短伊字上聲聲近於翼反別體作長伊字依字長呼別體作短甌字上聲聲近屋別體作長甌字長呼別體作短藹字去聲聲近櫻係反長藹字近於界反短奧字去聲近污別體作長奧字依字長呼別體作短暗字去聲聲近於鑒反別體作長疴字去聲近惡義淨三藏云上之三對上短上長下三對上長下短右悉曇十二字為後章之韻如用迦字之聲對阿伊甌等十二韻呼之則生得下迦機鉤矩侯反等十二字次用佉字之聲則生得佉欺丘區侯反等十二字次生伽其求瞿侯反等十二字已下例然且先書短迦字一十二文從第二字已下加其麼多即字形別也用悉曇韻呼之則識其字名也佉伽已下至叉字例然以成一章舊云十四音者即於悉曇十二字中甌字之下次有紇里紇梨里梨四字即除前悉曇中最後兩字謂之界畔字也餘則為十四音今約生字除紇里等四字也體文亦曰字母迦字居下反音近姜可反佉字去下反音近去可反迦字渠下反輕音音近其下反餘國有音疑可反伽字重音渠我反哦字魚下反音近魚可反餘國有音講反別體作加麼多已上五字牙聲者字止下反音近作可反車字昌下反音近倉可反別體作社字杓下反輕音音近作可反餘國有音而下反別體作社字重音音近昨我反若字而下反音近若我反餘國有音壤別體作已上五字齒聲吒字卓下反音近卓我反別體作加麼多侘字拆下反音近折我反別體作􅙞荼字宅下反輕音餘國有音搦下反荼字重音音近幢我反拏字搦下反音近搦我反餘國有音拏講反別體作加麼多已上五字舌聲多字怛下反音近多可反別體作他字他下反音近他可反陀字大下反輕音餘國有音陀可反陀字重音音近陀可反那字捺下反音近那可反餘國有音音曩別體作已上五字喉聲波字𭽽下反音近波我反頗字破下反音近破我反婆字罷下反輕音餘國有音麼字下不尖異後婆字重音薄我反麼字莫下反音近莫可反餘國有音莽已上五字脣聲也字藥下反音近藥可反又音祗也反訛也囉字曷力下反三合卷舌呼囉羅字洛下反音近洛可反嚩字房下反音近房可反舊又音和一云字下尖奢字舍下反音近舍可反沙字沙下反音近沙可反一音府下反娑字娑下反音近娑可反訶字許下反音近許可反一本音賀濫字力陷反音近郎紺反叉字楚下反音近楚可反已上十字遍口聲右字體三十五字後章用三十四字為體唯濫字全不能生餘隨所生具如常章論之第一章迦迦右初章生字四百有八先於字母中每字平書一十二文次將麼多如次點之則字形別也用悉曇韻呼之則識其字名也其麼多有別體者任逐便用之皆通此初章為後相次六章之體先書此章字但除重及囉羅三字合三十二字所生三百八十四字即將也等字如次於下合之後加麼多則字字別也將悉曇十二韻相對呼之則識其字名也恐未曉悟更每章頭書一二數字以為規準後皆效此第二章己也二合紀耶二合紀以二合紀夷二合矩庾二合矩俞二合枳曳二合枳與蓋反句俞二合句曜庾告反矩焰迦上夜已上第二章初字所生一十二文後皆效此讀者連帶轉聲調韻呼之第三章迦上略上迦平略平己里機釐苟漊鉤婁呂鉤反餘同上第四章迦攞上迦攞平第五章迦嚩上迦嚩平第六章􅂪迦麼􅂫迦摩第七章迦娜􅋱迦娜第八章􅕷阿勒迦上􅕸阿勒迦平􅕹伊上力紀􅕺伊力機􅕻歐鹿苟上􅕼歐鹿鉤平􅕽醫力葪􅕾醫力介􅖡阿勒勾􅖢阿勒憍腳號反􅖣阿勒劍􅖤阿勒迦去右第八章字同初章但用半體囉加諸字上後點麼多也又此章為後相次六章字體同前第二已下也但加半體囉也第九章􅟫阿勒已也􅟬阿勒枳耶第十章􅩲阿勒迦略上􅩳阿勒迦囉第十一章􅳦阿勒迦攞􅳧阿勒迦攞第十二章􅽭阿勒迦嚩上􅽮阿勒迦嚩平第十三章阿勒迦麼阿勒迦摩第十四章阿勒迦娜阿勒迦娜第十五章盎迦上盎迦平應上紀應機蓊苟俱口反蓊鉤俱候反櫻於項反荊櫻介擁句擁憍腳傲反盎鑑盎迦去已上伽字上用盎字冠之生十二字盎佉上盎佉平生十二字同上迦字用麼多及呼字轉聲法下同盎伽上盎佉平生十二字同上盎伽上聲盎佉平重生十二字同上字並將冠上四字之首不復自重後皆效此已上牙聲之字皆用盎聲安者安遮生十二字同上此是字之省安車上安車生十二字安社安闍生十二字安社重安闍重生十二字字為上四字所用不可更自重已上齒聲之字同用安音阿亶反安吒上安吒平生十二安字安侘上丑加反安侘生十二字安茶上安茶生十二字安茶上重安茶重音生十二字字為上四字所用不可更自重此字有自重者便屬別章則大呼拏音非盎拏也餘並同此也已上舌聲之字同用安聲安多上安多生十二字安他上安他生十二字安挓上安挓生十二字安陀上重安陀重音生十二字字為上四字所用不可更自重若重屬別章已上喉聲之字同用安聲唵跛唵跛生十二字唵頗上唵頗平生十二字唵婆上唵婆生十二字唵婆上重音唵婆重生十二字字為上四字所用不更自重已上脣聲之字同用唵聲盎也盎耶生十二字盎攞上盎囉生十二字盎攞上盎攞生十二字盎攞上盎嚩平生十二字盎捨盎奢生十二字盎灑盎沙生十二字盎娑上盎娑平生十二字盎訶上盎訶生十二字盎叉上盎叉生十二字右此章字兩字重成不得依字呼之異於諸章故云異章然盎安等將讀之際潛帶其音亦不分明稱盎安也第十六章訖里乞里佉里佉里重音齕里齒里質里實里實里重音日里已下並同吉里反但用於下合之讀者取其聲勢亦有用麼多得重成字用非遍能生也第十七章阿索迦生十二字阿索佉已下各生十二字阿拖伽阿拖伽重盎迦怛囉阿嚩遮阿伐車阿伐社阿伐闍重阿社若阿瑟吒阿瑟侘阿拖荼阿拖荼重阿瑟拏阿薩多阿薩他阿伐拖阿伐拖重阿勒多薩那阿薩波阿薩頗阿拖婆阿拖婆重阿勒叉麼阿勒叉微耶阿勒叉微釐耶阿刺多阿多迦嚩阿吒奢阿吒沙阿沙訶阿婆叉已上一章重文讀之皆帶阿聲連促呼之此章亦除濫字又合娑訶字唯三十三字皆通十二字加麼多也其於字母不次者分入後章第十八章孤合之文阿跛多阿吒迦阿娜薩嚩阿吒瑟車囉右此章字類流派無盡或通三五麼多讀之並同上章當體重兩多社吒拏那等字並依本字大呼多則不得云多多也聯聲字上麼下盎迦後字之聲入於前似云莽迦也用此章字皆然兩重麼多字部林去齒林去吽已上字有第六及第十一麼多讀之皆帶兩聲也此是第六麼多分布於傍也半體文多達又作皆同也秖耶當是耶字之省也印文字是室梨字西域為印也此類甚多略出其狀也前敘云囉於生字不應遍諸章謂第二第四五六七章用之其字則屬第八章也若第三及第八章用之成當體重非此章字也若第九已下四章用之則更重重全非字也其囉字當體重及重章中當體重書者至此但存一重字不須生十二也雖或有用處亦通三五麼多非遍能生故不入此生字之內緣存一當體重字故云容之勿生也後第十八云或當體兩字重之但依字大呼謂多闍吒拏等各有重成也等者等餘字母並有重成之用也但大呼之不得言多多囉囉等也
